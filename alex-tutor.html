<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Lily — AI English Tutor</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f5f0; --surface: #ffffff; --surface2: #f0ede6;
    --border: rgba(0,0,0,0.1); --text: #1a1a1a; --text2: #6b6b6b; --text3: #a0a0a0;
    --green: #1D9E75; --green-light: #E1F5EE; --green-dark: #0F6E56; --green-border: #9FE1CB;
    --amber: #FAEEDA; --amber-border: #FAC775; --amber-text: #633806;
    --purple-light: #EEEDFE; --purple-border: #AFA9EC; --purple-text: #534AB7;
    --blue-light: #E6F1FB; --blue-border: #85B7EB; --blue-text: #185FA5;
    --radius: 12px; --radius-sm: 8px;
  }
  body {
    font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem 1rem;
  }
  .container { width: 100%; max-width: 460px; display: flex; flex-direction: column; align-items: center; gap: 1.25rem; }

  /* BADGE */
  .badge {
    font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 4px 14px; border-radius: 20px; border: 0.5px solid var(--border);
    background: var(--surface2); color: var(--text2); transition: all 0.2s;
  }
  .badge.speaking { color: var(--green-dark); border-color: var(--green-border); background: var(--green-light); }
  .badge.thinking { color: var(--purple-text); border-color: var(--purple-border); background: var(--purple-light); }
  .badge.listening { color: var(--blue-text); border-color: var(--blue-border); background: var(--blue-light); }

  /* VOICE TOGGLE */
  .voice-toggle {
    display: flex; border: 0.5px solid var(--border); border-radius: 20px;
    overflow: hidden; background: var(--surface2);
  }
  .v-opt {
    font-size: 11px; font-weight: 500; padding: 5px 12px; cursor: pointer;
    color: var(--text3); background: transparent; border: none;
    font-family: 'Sora', sans-serif; transition: all 0.15s;
  }
  .v-opt.active { background: var(--green); color: white; }

  /* CHAT */
  #chat-box {
    width: 100%; background: var(--surface); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 1rem; display: flex; flex-direction: column; gap: 10px;
  }
  #messages {
    display: flex; flex-direction: column; gap: 8px;
    min-height: 100px; max-height: 220px; overflow-y: auto; padding-right: 4px;
  }
  #messages::-webkit-scrollbar { width: 3px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .msg { padding: 10px 14px; border-radius: var(--radius); font-size: 14px; line-height: 1.6; max-width: 90%; }
  .msg.ai  { background: var(--surface2); color: var(--text); align-self: flex-start; border: 0.5px solid var(--border); }
  .msg.user { background: var(--green-light); color: #085041; align-self: flex-end; border: 0.5px solid var(--green-border); }
  .msg.error { background: #FCEBEB; color: #A32D2D; align-self: flex-start; border: 0.5px solid #F7C1C1; font-size: 13px; }

  #correction {
    display: none; padding: 10px 14px; border-radius: var(--radius-sm);
    border: 0.5px solid var(--amber-border); background: var(--amber);
    color: var(--amber-text); font-size: 13px; line-height: 1.5;
  }
  #input-row { display: flex; gap: 8px; }
  #user-input {
    flex: 1; height: 42px; padding: 0 14px; font-size: 14px; font-family: 'Sora', sans-serif;
    border: 0.5px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text); outline: none;
  }
  #user-input:focus { border-color: var(--green); box-shadow: 0 0 0 2px var(--green-light); }
  #send-btn {
    height: 42px; padding: 0 18px; font-size: 14px; font-weight: 500; font-family: 'Sora', sans-serif;
    background: var(--green); color: white; border: none; border-radius: var(--radius-sm);
    cursor: pointer; transition: background 0.15s;
  }
  #send-btn:hover { background: var(--green-dark); }
  #send-btn:disabled { background: var(--surface2); color: var(--text3); cursor: default; }

  #mic-btn {
    height: 42px; width: 42px; flex: none; font-size: 18px; line-height: 1;
    border: 0.5px solid var(--border); border-radius: var(--radius-sm);
    background: var(--surface2); color: var(--text); cursor: pointer;
    transition: all 0.15s; user-select: none; touch-action: none;
  }
  #mic-btn:hover { background: var(--green-light); border-color: var(--green-border); }
  #mic-btn.recording {
    background: var(--blue-light); border-color: var(--blue-border);
    animation: mic-pulse 1s ease-in-out infinite;
  }
  @keyframes mic-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(133,183,235,0.55); }
    50%     { box-shadow: 0 0 0 7px rgba(133,183,235,0); }
  }

  .hint-chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .chip {
    font-size: 12px; color: var(--text2); padding: 4px 10px;
    border: 0.5px solid var(--border); border-radius: 20px;
    background: var(--surface); cursor: pointer; transition: all 0.15s;
  }
  .chip:hover { background: var(--green-light); color: var(--green-dark); border-color: var(--green-border); }

  footer { font-size: 11px; color: var(--text3); text-align: center; }
</style>
</head>
<body>

  </div>

  <span id="badge" class="badge">ready</span>

  <!-- VOICE TOGGLE -->
  <div class="voice-toggle">
    <button class="v-opt active" id="opt-browser" onclick="setVoiceMode('browser')">Browser TTS</button>
    <button class="v-opt" id="opt-eleven" onclick="setVoiceMode('eleven')">ElevenLabs (Rachel)</button>
    <button class="v-opt" id="opt-mute" onclick="setVoiceMode('mute')">Mute</button>
  </div>

  <!-- CHAT -->
  <div id="chat-box">
    <div id="messages">
      <div class="msg ai">Hi! I'm Lily, your English tutor 👋 What would you like to talk about today?</div>

    <div id="correction"></div>
    <div id="input-row">
      <button id="mic-btn" title="Hold to speak / Зажми и говори">🎤</button>

  <div class="hint-chips">
    <span class="chip" onclick="setInput('Tell me about yourself')">Tell me about yourself</span>
    <span class="chip" onclick="setInput('I goed to store yesterday')">Test correction</span>
    <span class="chip" onclick="setInput('Can we practice past tense?')">Practice grammar</span>
    <span class="chip" onclick="setInput('What is difference between since and for?')">since vs for</span>

  <footer>Lily Tutor · keys live in server.py</footer>

<script>
const $ = id => document.getElementById(id);
const ELEVEN_VOICE_ID = '21m00Tcm4TlvDq8ikWAM'; // Rachel
let voiceMode = 'browser';
let busy = false, blinkTimer, lipTimer, currentUtterance = null;
let history = [];

const SYSTEM = `You are Lily, a friendly English language tutor. Rules:
1. By default, reply in English to help the user practice.
2. If the user writes in Russian or asks you to speak Russian — switch to Russian and stay in Russian until they ask to switch back.
3. Keep replies SHORT (2-3 sentences max).
4. If the user made a grammar or spelling mistake in English, add on a new line exactly: CORRECTION: [short friendly explanation in the language you are currently using]
5. Do NOT add CORRECTION for Russian messages.
6. Be warm, encouraging and patient.`;

function setVoiceMode(mode) {
  voiceMode = mode;
  ['browser','eleven','mute'].forEach(m => $('opt-'+m).classList.toggle('active', m === mode));
}

// --- ANIMATION ---
// Blink handled by CSS animation on #left-lid / #right-lid
function startBlink() {} // no-op, CSS handles it

function lip(on) {
  clearInterval(lipTimer);
  const m = $('mouth'), mo = $('mouth-open');
  if (!on) { m.setAttribute('d','M204 207 Q220 220 236 207'); mo.setAttribute('opacity','0'); return; }
  let open = false;
  lipTimer = setInterval(() => {
    open = !open;
    if (open) { mo.setAttribute('opacity','1'); mo.setAttribute('d','M206 205 Q220 224 234 205'); m.setAttribute('d','M206 205 Q220 200 234 205'); }
    else { mo.setAttribute('opacity','0.2'); m.setAttribute('d','M204 207 Q220 220 236 207'); }
  }, 110 + Math.random()*60);
}

function face(state) {
  const td = $('think-dots');
  if (!td) return;
  td.setAttribute('opacity', state === 'thinking' ? '1' : '0');
}

function setStatus(s) {
  const b = $('badge');
  b.className = 'badge ' + s;
  b.textContent = {ready:'ready', thinking:'thinking...', speaking:'speaking'}[s] || s;
}

function addMsg(text, role) {
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.textContent = text;
  $('messages').appendChild(el);
  $('messages').scrollTop = $('messages').scrollHeight;
}

function setInput(text) { $('user-input').value = text; $('user-input').focus(); }

// --- VOICE ---

// Detect language of text (Russian or English)
function detectLang(text) {
  const ruChars = (text.match(/[а-яёА-ЯЁ]/g) || []).length;
  const enChars = (text.match(/[a-zA-Z]/g) || []).length;
  return ruChars > enChars ? 'ru' : 'en';
}

// Split mixed text into segments by language
function splitByLang(text) {
  const segments = [];
  // Split on boundaries between cyrillic and latin word groups
  const parts = text.split(/(?<=[а-яёА-ЯЁ\s])(?=[a-zA-Z«»"'])|(?<=[a-zA-Z»"'\s])(?=[а-яёА-ЯЁ])/);
  for (const part of parts) {
    if (!part.trim()) continue;
    const ruCount = (part.match(/[а-яёА-ЯЁ]/g) || []).length;
    const enCount = (part.match(/[a-zA-Z]/g) || []).length;
    const lang = ruCount >= enCount ? 'ru' : 'en';
    // merge with previous if same lang
    if (segments.length && segments[segments.length-1].lang === lang) {
      segments[segments.length-1].text += part;
    } else {
      segments.push({ lang, text: part });
    }
  }
  return segments.length ? segments : [{ lang: detectLang(text), text }];
}

function speakBrowser(text, onEnd) {
  if (!window.speechSynthesis) { onEnd(); return; }
  window.speechSynthesis.cancel();

  const voices = window.speechSynthesis.getVoices();
  const ruVoice = voices.find(v => v.lang === 'ru-RU' && v.name.includes('Google'))
    || voices.find(v => v.lang === 'ru-RU')
    || voices.find(v => v.lang.startsWith('ru'));
  const enVoice = voices.find(v => v.lang.startsWith('en') && v.name.includes('Google'))
    || voices.find(v => v.lang === 'en-US')
    || voices.find(v => v.lang.startsWith('en'));

  const segments = splitByLang(text);
  let i = 0;

  function speakNext() {
    if (i >= segments.length) { lip(false); onEnd(); return; }
    const seg = segments[i++];
    const utt = new SpeechSynthesisUtterance(seg.text);
    utt.rate = 0.95; utt.pitch = 1.05;
    // Use English voice only for clearly English segments, Russian for everything else
    const hasEnglish = (seg.text.match(/[a-zA-Z]/g) || []).length > 3;
    if (seg.lang === 'en' && hasEnglish && enVoice) {
      utt.lang = 'en-US';
      utt.voice = enVoice;
    } else {
      utt.lang = 'ru-RU';
      if (ruVoice) utt.voice = ruVoice;
    }
    utt.onstart = () => lip(true);
    utt.onend = speakNext;
    utt.onerror = speakNext;
    window.speechSynthesis.speak(utt);
  }

  speakNext();
}

async function speakElevenLabs(text, onEnd) {
  const lang = detectLang(text);
  // ElevenLabs multilingual model handles both ru and en automatically
  try {
    const res = await fetch(`/proxy/elevenlabs/${ELEVEN_VOICE_ID}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        text,
        model_id: 'eleven_multilingual_v2',
        voice_settings: { stability: 0.5, similarity_boost: 0.8 }
      })
    });
    if (!res.ok) throw new Error('ElevenLabs ' + res.status);
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.onplay = () => lip(true);
    audio.onended = () => { lip(false); URL.revokeObjectURL(url); onEnd(); };
    audio.onerror = () => { lip(false); onEnd(); };
    await audio.play();
  } catch(e) {
    console.warn('ElevenLabs failed, falling back:', e.message);
    speakBrowser(text, onEnd);
  }
}

function speak(text, onEnd) {
  if (voiceMode === 'mute') { lip(true); setTimeout(() => { lip(false); onEnd(); }, Math.max(1400, text.length*50)); return; }
  if (voiceMode === 'eleven') { speakElevenLabs(text, onEnd); return; }
  speakBrowser(text, onEnd);
}

// --- SEND ---
async function send() {
  if (busy) return;
  const text = $('user-input').value.trim();
  if (!text) return;
  $('user-input').value = '';
  $('correction').style.display = 'none';
  addMsg(text, 'user');
  history.push({ role: 'user', content: text });
  busy = true; $('send-btn').disabled = true;
  setStatus('thinking'); face('thinking');

  try {
    const res = await fetch('/proxy/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: SYSTEM, messages: history })
    });
    if (!res.ok) { const e = await res.json(); throw new Error(e.error?.message || 'HTTP '+res.status); }

    const data = await res.json();
    const full = data.content.map(b => b.text||'').join('');
    history.push({ role: 'assistant', content: full });

    let reply = full, correction = null;
    const ci = full.indexOf('CORRECTION:');
    if (ci !== -1) { reply = full.slice(0, ci).trim(); correction = full.slice(ci+11).trim(); }

    addMsg(reply, 'ai');
    if (correction) { $('correction').style.display = 'block'; $('correction').textContent = '✏️ ' + correction; }
    setStatus('speaking'); face('speaking');

    speak(reply, () => { face('happy'); setStatus('ready'); busy = false; $('send-btn').disabled = false; });

  } catch(e) {
    addMsg('Error: ' + e.message, 'error');
    face('happy'); setStatus('ready'); busy = false; $('send-btn').disabled = false; lip(false);
  }
}

// --- SPEECH RECOGNITION (server-side Whisper, hold-to-talk, авто-язык) ---
let mediaRecorder = null, audioChunks = [], pressing = false, transcribing = false;
let micStream = null, recMime = 'audio/webm';

function setupMic() {
  const micBtn = $('mic-btn');
  if (!navigator.mediaDevices || !window.MediaRecorder) {  // нет поддержки — прячем кнопку
    micBtn.style.display = 'none';
    return;
  }

  // Микрофон запрашиваем один раз и держим поток — чтобы нажатие стартовало запись мгновенно,
  // без асинхронной гонки getUserMedia (из-за неё получались пустые 110-байтные клипы).
  async function ensureStream() {
    if (micStream) return micStream;
    micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    return micStream;
  }

  const start = async (ev) => {
    ev.preventDefault();
    if (busy || transcribing || pressing) return;
    pressing = true;
    micBtn.classList.add('recording');
    setStatus('listening');
    try {
      await ensureStream();
    } catch(_) {
      pressing = false; micBtn.classList.remove('recording'); setStatus('ready');
      addMsg('Нет доступа к микрофону. Печатай текстом.', 'error');
      return;
    }
    if (!pressing) return;   // отпустили, пока запрашивался доступ — не пишем вхолостую

    recMime = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : 'audio/webm';
    audioChunks = [];
    mediaRecorder = new MediaRecorder(micStream, { mimeType: recMime });
    mediaRecorder.ondataavailable = e => { if (e.data.size) audioChunks.push(e.data); };
    mediaRecorder.onstop = transcribe;
    mediaRecorder.start(200);   // сбрасываем чанки каждые 200 мс
  };

  const stop = (ev) => {
    ev.preventDefault();
    if (!pressing) return;
    pressing = false;
    micBtn.classList.remove('recording');
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();          // дальше сработает onstop → transcribe()
    } else {
      setStatus('ready');            // запись не успела стартовать
    }
  };

  micBtn.addEventListener('pointerdown', start);
  micBtn.addEventListener('pointerup', stop);
  micBtn.addEventListener('pointerleave', stop);   // увёл палец/курсор — тоже стоп
  micBtn.addEventListener('pointercancel', stop);
}

async function transcribe() {
  const blob = new Blob(audioChunks, { type: recMime });
  if (blob.size < 1500) {   // слишком короткий клип — нечего распознавать
    setStatus('ready');
    addMsg('Слишком коротко — зажми 🎤 и говори чуть дольше.', 'error');
    return;
  }
  transcribing = true;
  setStatus('thinking'); face('thinking');
  try {
    const res = await fetch('/proxy/stt', { method: 'POST', body: blob });
    if (!res.ok) { const e = await res.json().catch(()=>({})); throw new Error(e.error?.message || 'HTTP '+res.status); }
    const data = await res.json();
    setStatus('ready'); face('happy');
    if (data.text && data.text.trim()) {
      $('user-input').value = data.text.trim();   // Whisper уже определил язык (data.language)
      send();
    }
  } catch(e) {
    setStatus('ready'); face('happy');
    addMsg('Не удалось распознать речь: ' + e.message, 'error');
  } finally {
    transcribing = false;
  }
}
setupMic();

$('send-btn').addEventListener('click', send);
$('user-input').addEventListener('keydown', e => { if (e.key==='Enter') send(); });
if (window.speechSynthesis) {
  window.speechSynthesis.getVoices();
  window.speechSynthesis.addEventListener('voiceschanged', () => window.speechSynthesis.getVoices());
}
startBlink();
face('happy');
</script>
</body>
